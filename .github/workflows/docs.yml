# Builds the MkDocs Material deployment guide and publishes it to GitHub Pages
# (the gh-pages branch), mirroring how the reference Dynatrace lab is published.
#
# After the first successful run: GitHub repo → Settings → Pages →
# "Deploy from a branch" → branch: gh-pages, folder: / (root).
name: Publish docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "docs-requirements.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install -r docs-requirements.txt
      - run: mkdocs gh-deploy --force --no-history
