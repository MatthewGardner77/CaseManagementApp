site_name: Deploy the Citizen Services Case Management Demo on AWS + Dynatrace
site_description: >-
  Stand up the docker-compose Citizen Services Case Management demo on a single
  AWS EC2 instance and monitor it with Dynatrace OneAgent (host agent).

# When you publish to GitHub Pages, set these to your repo (see Operations page).
# site_url: https://<your-org>.github.io/<your-repo>/
# repo_url: https://github.com/<your-org>/<your-repo>
# repo_name: <your-org>/<your-repo>

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Overview: index.md
  - 1 · Prerequisites: prerequisites.md
  - 2 · EC2 & host setup: ec2-setup.md
  - 3 · Deploy the app: deploy-app.md
  - 4 · Install Dynatrace OneAgent: install-oneagent.md
  - 5 · Validate & run the demo: validate-demo.md
  - 6 · Day-to-day operations: operations.md
  - 7 · Cleanup: cleanup.md
